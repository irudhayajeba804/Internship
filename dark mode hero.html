<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark mode hero</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.min.js"></script>
    <style>
        body {
            background-color: #212529;
        }

        .btn-custom {
            color: #0dcaf0;
            border-color: #0dcaf0;
        }

        .btn-custom:hover {
            background-color: #0dcaf0;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="px-4 py-5 my-5 text-center bg-dark text-white">
        <h1 class="display-5 fw-bold">Dark mode hero</h1>
        <div class="col-lg-6 mx-auto">
            <p class="lead mb-4 text-secondary">
                Quickly design and customize responsive mobile-first sites with
                Bootstrap, the world's most popular front-end open source toolkit,
                featuring Sass variables and mixins, responsive grid system, extensive
                prebuilt components, and powerful JavaScript plugins.
            </p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <button type="button" class="btn btn-outline-info btn-lg px-4 btn-custom">Custom button</button>
                <button type="button" class="btn btn-outline-light btn-lg px-4">Secondary</button>
            </div>
        </div>
    </div>
</body>

</html>
