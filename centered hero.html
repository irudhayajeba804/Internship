<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Hero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .btn {
            background-color: #3a86ff;
        }
    </style>
</head>

<body>
    <div class="mt-5 text-center">
        <h1 class="display-5 fw-bold text-body-emphasis">Centered hero</h1>
        <div class="col-lg-6 mx-auto">
            <p class="text-justify mt-4 p-3">
                Quickly design and customize responsive mobile-first sites with
                Bootstrap, the world's most popular front-end open source toolkit,
                featuring Sass variables and mixins, responsive grid system, extensive
                prebuilt components, and powerful JavaScript plugins.
            </p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <button type="button" class="btn btn-blue btn-lg px-4 gap-3">Primary button</button>
                <button type="button" class="btn1 btn1-outline-secondary btn1-lg px-4">Secondary</button>
            </div>
        </div>
    </div>

</body>

</html>
