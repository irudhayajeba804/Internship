<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>My Tech Stack</title>
    <style>
        body {
            background-color: #0d1117;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 60px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 40px;
            margin-bottom: 32px;
            font-weight: 600;
        }

        h1 .highlight {
            color: #7dd3fc;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 40px;
            background-color: #161b22;
            padding: 6px;
            border-radius: 8px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .tab {
            padding: 10px 24px;
            background-color: transparent;
            color: #c9d1d9;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }

        .tab.active {
            background-color: #7dd3fc;
            color: #0d1117;
            font-weight: 600;
        }

        .tab:hover:not(.active) {
            background-color: #21262d;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .card {
            background-color: #161b22;
            border-radius: 8px;
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            background-color: #1c2128;
        }

        .card i {
            font-size: 48px;
        }

        .card p {
            font-size: 16px;
            color: #c9d1d9;
        }
    </style>
</head>

<body translate="no">
    <div class="container">
        <h1>
            My
            <span class="highlight">
                Tech Stack
            </span>
        </h1>
        <div class="tabs">
            <button class="tab active">
                All (25)
            </button>
            <button class="tab">
                Languages (7)
            </button>
            <button class="tab">
                Tools (8)
            </button>
            <button class="tab">
                Libraries (5)
            </button>
            <button class="tab">
                Databases (4)
            </button>
        </div>
        <div class="grid">
            <div class="card">
                <i class="devicon-c-plain colored">
                </i>
                <p>
                    C
                </p>
            </div>
            <div class="card">
                <i class="devicon-cplusplus-plain colored">
                </i>
                <p>
                    C++
                </p>
            </div>
            <div class="card">
                <i class="devicon-python-plain colored">
                </i>
                <p>
                    Python
                </p>
            </div>
            <div class="card">
                <i class="devicon-java-plain colored">
                </i>
                <p>
                    Java
                </p>
            </div>
            <div class="card">
                <i class="devicon-html5-plain colored">
                </i>
                <p>
                    HTML
                </p>
            </div>
            <div class="card">
                <i class="devicon-css3-plain colored">
                </i>
                <p>
                    CSS
                </p>
            </div>
            <div class="card">
                <i class="devicon-numpy-plain colored">
                </i>
                <p>
                    Numpy
                </p>
            </div>
            <div class="card">
                <i class="devicon-pandas-plain colored">
                </i>
                <p>
                    Pandas
                </p>
            </div>
            <div class="card">
                <i class="devicon-matplotlib-plain colored">
                </i>
                <p>
                    Matplotlib
                </p>
            </div>
            <div class="card">
                <i class="devicon-mysql-plain colored">
                </i>
                <p>
                    MySQL
                </p>
            </div>
            <div class="card">
                <i class="devicon-postgresql-plain colored">
                </i>
                <p>
                    PostgreSQL
                </p>
            </div>
            <div class="card">
                <i class="devicon-mongodb-plain colored">
                </i>
                <p>
                    MongoDB
                </p>
            </div>
            <div class="card">
                <i class="devicon-sqlite-plain colored">
                </i>
                <p>
                    Sqlite3
                </p>
            </div>
            <div class="card">
                <i class="devicon-react-original colored">
                </i>
                <p>
                    React
                </p>
            </div>
            <div class="card">
                <i class="devicon-azuresqldatabase-plain colored">
                </i>
                <p>
                    SQL
                </p>
            </div>
        </div>
    </div>
    <script id="rendered-js">
        const tabs = document.querySelectorAll('.tab');
        const cards = document.querySelectorAll('.card');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const filter = tab.textContent.trim();

                cards.forEach(card => {
                    const category = card.querySelector('p').textContent;
                    if (filter === 'All (25)' || category === filter.split(' ')[0]) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
