<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technical Skills</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Georgia, serif;
}

body{
    background:#000;
    color:#fff;
}

.skills-section{
    padding:80px 5%;
    text-align:center;
}
.badge {
            background: linear-gradient(90deg, #8B4513, #CD853F);
            color: #fff;
            border-radius: 50px;
            padding: 8px 24px;
            display: inline-block;
            font-weight: 600;
            margin-bottom: 20px;
}

.skills-title{
    font-size:60px;
    color:#c89b2a;
    margin-bottom:15px;
}

.skills-subtitle{
    font-size:22px;
    margin-bottom:60px;
}

.skills-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:30px;
}

.skill-card{
    background:#f7f7f7;
    color:#000;
    padding:35px;
    border-radius:25px;
    text-align:left;
}

.card-header{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:30px;
}

.icon-box{
    width:80px;
    height:80px;
    background:#f4efe5;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:#b8860b;
}

.card-title{
    font-size:24px;
    font-weight:bold;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.tag{
    padding:10px 18px;
    background:#f4efe5;
    border-radius:25px;
    color:#b8860b;
    font-weight:600;
}
</style>
</head>
<body>

<section class="skills-section">

    <div class="badge">Skills & Expertise</div>

    <h1 class="skills-title">Technical Skills</h1>

    <p class="skills-subtitle">
        Technologies and tools I use to design and develop modern web solutions
    </p>

    <div class="skills-grid">

        <div class="skill-card">
            <div class="card-header">
                <div class="icon-box">▣</div>
                <h3 class="card-title">Frontend</h3>
            </div>

            <div class="tags">
                <span class="tag">HTML</span>
                <span class="tag">CSS</span>
                <span class="tag">JavaScript</span>
                <span class="tag">Bootstrap</span>
            </div>
        </div>

        <div class="skill-card">
            <div class="card-header">
                <div class="icon-box">◉</div>
                <h3 class="card-title">Backend / CMS</h3>
            </div>

            <div class="tags">
                <span class="tag">WordPress</span>
                <span class="tag">PHP (Basic)</span>
                <span class="tag">MySQL</span>
            </div>
        </div>

        <div class="skill-card">
            <div class="card-header">
                <div class="icon-box">🎨</div>
                <h3 class="card-title">Design Tools</h3>
            </div>

            <div class="tags">
                <span class="tag">Adobe Photoshop</span>
                <span class="tag">Canva</span>
                <span class="tag">Figma</span>
            </div>
        </div>

        <div class="skill-card">
            <div class="card-header">
                <div class="icon-box">⌘</div>
                <h3 class="card-title">Dev Tools</h3>
            </div>

            <div class="tags">
                <span class="tag">VPS Server</span>
                <span class="tag">GitHub</span>
            </div>
        </div>

    </div>

</section>

</body>
</html>
