<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Cards</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .card-cover {
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            border: none;
            height: 400px;
        }
        .card-overlay {
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
        }
        .bootstrap-icon {
            width: 32px;
            height: 32px;
            background-color: #7952b3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container px-4 py-5">
        <div class="row row-cols-1 row-cols-lg-3 align-items-stretch g-4">
            <div class="col">
                <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg" 
                     style="background-image: url('https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?w=800&auto=format&fit=crop');">
                    <div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1 card-overlay">
                        <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Short title, long jacket</h3>
                        <ul class="d-flex list-unstyled mt-auto">
                            <li class="me-auto">
                                <div class="bootstrap-icon">B</div>
                            </li>
                            <li class="d-flex align-items-center me-3">
                                <i class="bi bi-geo-fill me-2"></i>
                                <small>Earth</small>
                            </li>
                            <li class="d-flex align-items-center">
                                <i class="bi bi-calendar3 me-2"></i>
                                <small>3d</small>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg" 
                     style="background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&auto=format&fit=crop');">
                    <div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1 card-overlay">
                        <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Much longer title that wraps to multiple lines</h3>
                        <ul class="d-flex list-unstyled mt-auto">
                            <li class="me-auto">
                                <div class="bootstrap-icon">B</div>
                            </li>
                            <li class="d-flex align-items-center me-3">
                                <i class="bi bi-geo-fill me-2"></i>
                                <small>Pakistan</small>
                            </li>
                            <li class="d-flex align-items-center">
                                <i class="bi bi-calendar3 me-2"></i>
                                <small>4d</small>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg" 
                     style="background-image: url('https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=800&auto=format&fit=crop');">
                    <div class="d-flex flex-column h-100 p-5 pb-3 text-shadow-1 card-overlay">
                        <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Another longer title belongs here</h3>
                        <ul class="d-flex list-unstyled mt-auto">
                            <li class="me-auto">
                                <div class="bootstrap-icon">B</div>
                            </li>
                            <li class="d-flex align-items-center me-3">
                                <i class="bi bi-geo-fill me-2"></i>
                                <small>California</small>
                            </li>
                            <li class="d-flex align-items-center">
                                <i class="bi bi-calendar3 me-2"></i>
                                <small>5d</small>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
