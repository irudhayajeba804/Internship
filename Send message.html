<!DOCTYPE html>
<html>

<head>
    <title>Contact Form</title>
    <style>
        body {
            background: white;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            text-align: center;
        }

        h1 {
            color: #140d2d;
            text-align: center;
            margin-bottom: 30px;
        }

        input,
        textarea {
            width: 100%;
            padding: 25px;
            border: none;
            border-radius: 10px;
            background: #bbbdbef3;
            margin-bottom: 20px;
            font-size: 18px;
            border-style: outset;
        }

        .row {
            display: flex;
            gap: 20px;
            width: 105%;
        }

        .row input {
            width: 100%;
            border-style: outset;

        }

        textarea {
            width: 100%;
            height: 120px;
            border-style: outset;
            border-radius: 10px;
        }

        button {
            padding: 18px 80px;
            border-radius: 15px;
            border: 2px solid #666;
            background: #efc5b8;
            font-size: 20px;

        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Send me a message</h1>

        <form>
            <input type="text" placeholder="Enter Your Name / Company *">

            <div class="row">
                <input type="email" placeholder="Enter Your Email *">
                <input type="tel" placeholder="Enter Phone Number *">
            </div>

            <textarea placeholder="Write Message..."></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

</body>

</html>
